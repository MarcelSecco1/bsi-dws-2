<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Formulário</title>
</head>

<body>
    <div class="container py-3">
        <h2 class="page-title">Formulário de cadastro</h2>

        <div class="card panel">
            <div class="card-body p-4">
                <div class="row g-6 align-items-start">
                    <div class="col-6">
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Nome completo</label>
                                <input class="form-control" type="text" placeholder="Seu nome completo">
                            </div>
                    </div>

                    <div class="col-6">
                        <div class="mb-3">
                            <label class="form-label">Telefone</label>
                            <input class="form-control" type="tel" placeholder="(DD)XXXXX-XXXX"
                                pattern="\(\d{2}\)\s\d{4,5}-\d{4}" title="Digite o numero no formato (DD)XXXXX-XXXX"
                                required>
                        </div>
                    </div>
                </div>


                <div class="row">
                    <div class="col-6">
                        <div class="mb-3">
                            <label class="form-label">E-mail</label>
                            <input class="form-control" type="email" placeholder="seu@email.aqui" required>
                        </div>
                    </div>
                    <div class="col-3">
                        <div class="mb-3">
                            <label class="form-label">Data de nascimento</label>
                            <input class="form-control" type="date" required>
                        </div>
                    </div>
                    <div class="col-3">
                        <div class="mb-3">
                            <label class="form-label">CEP</label>
                            <input class="form-control" type="text" placeholder="XXXXX-XXX"
                                title="Digite o numero no formato XXXXX-XXX" pattern="\d{2}\.\d{3}-\d{3}" required>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">CPF</label>
                    <input class="form-control" type="text" placeholder="XXX.XXX.XXX-XX"
                        pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" title="Digite o cpf no formato XXX.XXX.XXX-XX" required>
                </div>
                <div class="row">
                    <div class="col-6">

                        <div class="mb-3">
                            <label class="form-label">Endereço</label>
                            <input class="form-control" type="text" placeholder="Rua, n° e bairro">
                        </div>
                    </div>

                    <div class="col-6">
                        <div class="mb-3">
                            <label class="form-label">Cidade</label>
                            <select class="form-select">
                                <option selected disabled>[Selecione]</option>
                                <option>Votuporanga</option>
                                <option>Cosmorama</option>
                                <option>São Paulo</option>
                                <option>Bauru</option>
                            </select>
                        </div>
                    </div>
                </div>



                <div class="row">
                    <div class="col-6">
                        <div class="mb-3">
                            <label class="form-label">Foto de perfil</label>
                            <input class="form-control" type="file" accept=".jpg,.png">
                        </div>
                    </div>
                    <div class="col-6">

                        <div class="mb-3">
                            <label class="form-label">Contrato assinado (Em PDF)</label>
                            <input class="form-control" type="file" accept=".pdf,.docx">
                        </div>
                    </div>

                </div>
            </div>

            <div class="mb-4 mx-4">
                <button type="submit" class="btn btn-primary btn-wide">Cadastrar</button>

                <button type="reset" class="btn btn-secondary btn-wide text-white">Limpar</button>
            </div>

            </form>
        </div>
    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

  <div class="container py-3">
    <h2 class="page-title">Formulário de cadastro e Tabela com dados</h2>

    <div class="row g-4 align-items-start">
      <div class="col-12 col-lg-4">
        <div class="card panel">
          <div class="card-body p-4">
            <form>
              <div class="mb-3">
                <label class="form-label">Nome completo</label>
                <input class="form-control" type="text" placeholder="Seu nome completo">
              </div>

              <div class="mb-3">
                <label class="form-label">Telefone</label>
                <input class="form-control" type="tel" placeholder="(99) 99999-9999">
              </div>

              <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input class="form-control" type="email" placeholder="seu@email.aqui">
              </div>

              <div class="mb-4">
                <label class="form-label">Estado de residência</label>
                <select class="form-select">
                  <option selected disabled>[Selecione]</option>
                  <option>São Paulo</option>
                  <option>Santa Catarina</option>
                  <option>Rio de Janeiro</option>
                  <option>Minas Gerais</option>
                </select>
              </div>

              <div class="d-flex flex-column gap-2">

                <button type="reset" class="btn btn-warning btn-wide text-white">Limpar</button>
                <button type="submit" class="btn btn-success btn-wide">Enviar</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-8">
        <div class="card panel">
          <div class="card-body p-0">
            <div class="table-wrap">
              <table class="table table-bordered table-hover mb-0 align-middle">
                <thead class="bg-primary text-white">
                  <tr>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>Email</th>
                    <th>Estado</th>
                  </tr>
